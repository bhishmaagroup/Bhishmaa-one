<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access Bhishmaa One, the state-of-the-art multi-tenant SaaS ERP and POS billing suite. Streamline billing, inventory, CRM, HRM, and reports under Bhishmaa Group. Developed by enoughsudhanshu.">
    <meta name="keywords" content="Bhishmaa One, Bhishmaa Group, bhishmaagroup.in, SaaS ERP, POS Billing, GST Invoice, Inventory Management, CRM, HRM, enoughsudhanshu, enterprise resource planning">
    <meta name="author" content="enoughsudhanshu">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bhishmaagroup.in">
    <meta property="og:title" content="Bhishmaa One - Next-Gen Multi-Tenant SaaS ERP">
    <meta property="og:description" content="Manage your operations, POS bills, CRM, HRM, and financial ledgers. Developed by enoughsudhanshu.">
    <meta property="og:image" content="https://bhishmaagroup.in/static/img/meta_banner.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://bhishmaagroup.in">
    <meta property="twitter:title" content="Bhishmaa One - SaaS ERP Portal">
    <meta property="twitter:description" content="Manage inventory, CRM, payroll, billing, and tax reports dynamically. Created by enoughsudhanshu.">
    <meta property="twitter:image" content="https://bhishmaagroup.in/static/img/meta_banner.png">

    <title>{% block title %}Sign In - Bhishmaa One{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}auth-body{% endblock %}">
    
    <div class="auth-container">
        <!-- Flash Alerts Messages System -->
        {% include "components/alerts.html" %}
        
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
